<div style="margin: 40px 0; text-align: center; font-family: sans-serif;">
  <!-- Navigation Buttons -->
  <div style="margin-bottom: 20px;">
    <a href="index.html"
       style="text-decoration: none; margin: 0 10px; padding: 12px 24px;
              background-color: #4CAF50; color: white; border-radius: 8px;
              font-weight: 700; transition: 0.3s; display: inline-block;">
      Back to Main Page
    </a>

    <a href="#" id="lastChapterBtn"
       style="text-decoration: none; margin: 0 10px; padding: 12px 24px;
              background-color: #ff6b6b; color: white; border-radius: 8px;
              font-weight: 700; transition: 0.3s; display: inline-block;">
      ⬅ Last Chapter
    </a>

    <a href="#" id="nextChapterBtn"
       style="text-decoration: none; margin: 0 10px; padding: 12px 24px;
              background-color: #ff6b6b; color: white; border-radius: 8px;
              font-weight: 700; transition: 0.3s; display: inline-block;">
      Next Chapter ➡
    </a>
  </div>

  <!-- Custom Chapter Dropdown -->
  <div style="position: relative; display: inline-block;">
    <label for="dropdownBtn" style="font-weight: 700; margin-right: 10px;">Jump to Chapter:</label>
    <button id="dropdownBtn" 
            style="padding: 10px 14px; border-radius: 6px; border: 1px solid #ccc;
                   font-size: 14px; font-weight: 500; background-color: #fff; cursor: pointer; min-width: 250px;">
      Select a chapter
    </button>
    <div id="dropdownList" 
         style="display: none; position: absolute; background-color: #fff; min-width: 250px;
                max-height: 200px; overflow-y: auto; border: 1px solid #ccc; border-radius: 6px; z-index: 1;">
      <!-- Chapters will be populated here -->
    </div>
  </div>
</div>

<style>
  a:hover {
    opacity: 0.85;
    transform: translateY(-2px);
  }
  #dropdownList div:hover {
    background-color: #f0f0f0;
  }
</style>

<script>
  const dropdownBtn = document.getElementById('dropdownBtn');
  const dropdownList = document.getElementById('dropdownList');
  const lastBtn = document.getElementById('lastChapterBtn');
  const nextBtn = document.getElementById('nextChapterBtn');

  // Toggle dropdown visibility
  dropdownBtn.addEventListener('click', () => {
    dropdownList.style.display = dropdownList.style.display === 'block' ? 'none' : 'block';
  });

  // Close dropdown if clicked outside
  window.addEventListener('click', e => {
    if (!dropdownBtn.contains(e.target) && !dropdownList.contains(e.target)) {
      dropdownList.style.display = 'none';
    }
  });

  // Load chapters from JSON
  fetch('chapters.json')
    .then(res => res.json())
    .then(chapters => {
      const currentFile = window.location.pathname.split('/').pop();
      let currentIndex = -1;

      chapters.forEach((ch, index) => {
        const div = document.createElement('div');
        div.textContent = ch.title;
        div.style.padding = '10px';
        div.style.cursor = 'pointer';
        div.onclick = () => window.location.href = ch.file;
        dropdownList.appendChild(div);

        if (ch.file.endsWith(currentFile)) {
          currentIndex = index;
          dropdownBtn.textContent = ch.title; // Show current chapter in button
        }
      });

      // Set Previous / Next buttons
      if(currentIndex >= 0){
        if(lastBtn) lastBtn.href = currentIndex > 0 ? chapters[currentIndex-1].file : '#';
        if(nextBtn) nextBtn.href = currentIndex < chapters.length-1 ? chapters[currentIndex+1].file : '#';
        if(currentIndex === 0 && lastBtn) lastBtn.style.pointerEvents = 'none';
        if(currentIndex === chapters.length-1 && nextBtn) nextBtn.style.pointerEvents = 'none';
      }
    })
    .catch(err => console.error('Failed to load chapters:', err));
</script>
