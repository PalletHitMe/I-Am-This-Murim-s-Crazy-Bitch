<div style="margin: 40px 0; text-align: center; font-family: sans-serif;">
  <!-- Navigation Buttons -->
  <div style="margin-bottom: 20px;">
    <a href="index.html" class="nav-btn back-btn">Back to Main Page</a>
    <a href="#" id="lastChapterBtn" class="nav-btn">⬅ Last Chapter</a>
    <a href="#" id="nextChapterBtn" class="nav-btn">Next Chapter ➡</a>
  </div>

  <!-- Chapter Dropdown -->
  <div>
    <label for="chapterSelect" style="font-weight: 700; margin-right: 10px;">Jump to Chapter:</label>
    <select id="chapterSelect" style="padding: 10px 14px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; font-weight: 500; background-color: #fff; cursor: pointer;">
      <option value="">Select a chapter</option>
    </select>
  </div>
</div>

<style>
  /* Button styles */
  .nav-btn {
    text-decoration: none;
    margin: 0 10px;
    padding: 12px 24px;
    background-color: #ff6b6b;
    color: white;
    border-radius: 8px;
    font-weight: 700;
    transition: transform 0.3s, opacity 0.3s;
    display: inline-block;
  }

  .back-btn {
    background-color: #4CAF50;
  }

  /* Hover effect */
  .nav-btn:hover {
    transform: translateY(-2px);
    opacity: 0.85;
  }

  /* Dropdown hover */
  #chapterSelect:hover {
    border-color: #888;
  }
</style>

<script>
  // Load chapters from JSON
  fetch('chapters.json')
    .then(res => res.json())
    .then(chapters => {
      const chapterSelect = document.getElementById('chapterSelect');
      const lastBtn = document.getElementById('lastChapterBtn');
      const nextBtn = document.getElementById('nextChapterBtn');

      // Populate dropdown
      chapters.forEach(ch => {
        const option = document.createElement('option');
        option.value = ch.file;
        option.textContent = ch.title;
        chapterSelect.appendChild(option);
      });

      // Detect current chapter
      const currentFile = window.location.pathname.split('/').pop();
      const currentIndex = chapters.findIndex(ch => ch.file === currentFile);

      if (currentIndex >= 0) {
        chapterSelect.value = chapters[currentIndex].file;

        // Set Previous and Next buttons
        lastBtn.href = currentIndex > 0 ? chapters[currentIndex - 1].file : '#';
        nextBtn.href = currentIndex < chapters.length - 1 ? chapters[currentIndex + 1].file : '#';

        // Disable buttons if at start/end
        if (currentIndex === 0) lastBtn.style.pointerEvents = 'none';
        if (currentIndex === chapters.length - 1) nextBtn.style.pointerEvents = 'none';
      }

      // Jump to chapter
      chapterSelect.addEventListener('change', () => {
        if (chapterSelect.value) window.location.href = chapterSelect.value;
      });
    })
    .catch(err => console.error('Failed to load chapters:', err));
</script>
