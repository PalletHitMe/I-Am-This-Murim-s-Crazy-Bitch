<div class="chapter-nav" style="text-align:center; margin: 20px 0;">
  <a href="index.html" id="backToMainBtn"
     style="text-decoration: none; margin: 0 10px; padding: 12px 24px;
            background-color: #4CAF50; color: white; border-radius: 8px;
            font-weight: 700; transition: 0.3s; display: inline-block;">
    Back to Main Page
  </a>
  <a href="#" id="lastChapterBtn"
     style="text-decoration: none; margin: 0 10px; padding: 12px 24px;
            background-color: #ff6b6b; color: white; border-radius: 8px;
            font-weight: 700; transition: 0.3s; display: inline-block;">
    ⬅ Last Chapter
  </a>
  <a href="#" id="nextChapterBtn"
     style="text-decoration: none; margin: 0 10px; padding: 12px 24px;
            background-color: #ff6b6b; color: white; border-radius: 8px;
            font-weight: 700; transition: 0.3s; display: inline-block;">
    Next Chapter ➡
  </a>
</div>

<script>
  // List of all chapters
  const chapters = [
    {file: 'chapter1.html', title: 'Chapter 1: The First Step into Murim'},
    {file: 'chapter2.html', title: 'Chapter 2: A Day In The Life Of A Second-Year Martial Artist (1)'},
    {file: 'chapter3.html', title: 'Chapter 3: A Day In The Life Of A Second-Year Martial Artist (2)'},
    {file: 'chapter4.html', title: 'Chapter 4: A Day In The Life Of A Second-Year Martial Artist (3)'},
    {file: 'chapter5.html', title: 'Chapter 5: Friend (1)'},
    {file: 'chapter6.html', title: 'Chapter 6: Friend (2)'},
    {file: 'chapter7.html', title: 'Chapter 7: Friend (3)'}
  ];

  const lastBtn = document.getElementById('lastChapterBtn');
  const nextBtn = document.getElementById('nextChapterBtn');

  const currentFile = window.location.pathname.split('/').pop();
  const currentIndex = chapters.findIndex(ch => ch.file === currentFile);

  if(currentIndex >= 0){
    if(lastBtn) lastBtn.href = currentIndex > 0 ? chapters[currentIndex-1].file : '#';
    if(nextBtn) nextBtn.href = currentIndex < chapters.length-1 ? chapters[currentIndex+1].file : '#';
    
    if(currentIndex === 0 && lastBtn) lastBtn.style.pointerEvents = 'none';
    if(currentIndex === chapters.length-1 && nextBtn) nextBtn.style.pointerEvents = 'none';
  }
</script>
