
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I Am This Murim's Crazy Bitch</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Link to external CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Cover + Info Section -->
  <section class="cover-info">
    <div class="cover-img">
      <img src="novelpic.jpg" alt="I Am This Murim's Crazy Bitch Cover">
    </div>
    <div class="info">
      <h1>I Am This Murim’s Crazy Bitch</h1>
      <p class="author">By PalletHitMe</p>
      <p class="tagline">I became a female character in a martial arts game I've never played before.
But I know nothing about martial arts.</p>
      <a href="#chapters" class="read-btn">Start Reading</a>
    </div>
  </section>

  <!-- Chapter List Section -->
  <section id="chapters" class="chapters-container">
    <h2>Chapters</h2>
    <div class="chapter-grid" id="chapterGrid">
      <!-- Chapter cards auto-generated via JS -->
    </div>
  </section>

  <!-- Footer -->
  <footer>
    &copy; 2026 PalletHitMe. All rights reserved.
  </footer>

  <!-- JS for auto-generating chapters -->
  <script>
    const chapters = [
      "The First Step into Murim",
      "A Day In The Life Of A Second-Year Martial Artist (1)",
      "A Day In The Life Of A Second-Year Martial Artist (2)",
      "A Day In The Life Of A Second-Year Martial Artist (3)",
      "Friend (1)",
      "Friend (2)"
    ];

    const chapterGrid = document.getElementById("chapterGrid");

    chapters.forEach((title, index) => {
      const chapNum = index + 1;
      const a = document.createElement("a");
      a.href = `chapter${chapNum}.html`;
      a.className = "chapter-card";

      a.innerHTML = `
        <span class="chapter-number">Chapter ${chapNum}</span>
        <span class="chapter-title">${title}</span>
      `;
      chapterGrid.appendChild(a);
    });
  </script>

</body>
</html>
