<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I Am This Murim's Crazy Bitch</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Link to external CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation (top) -->
  <div id="navigation"></div>

  <!-- Cover + Info Section -->
  <section class="cover-info">
    <div class="cover-img">
      <img src="novelpic.jpg" alt="I Am This Murim's Crazy Bitch Cover">
    </div>
    <div class="info">
      <h1>I Am This Murim’s Crazy Bitch</h1>
      <p class="author">By PalletHitMe</p>
      <p class="tagline">
        I became a female character in a martial arts game I've never played before. But I know nothing about martial arts.
      </p>
      <a href="chapter1.html" class="read-btn">Start Reading</a>
    </div>
  </section>

  <!-- Chapter List Section -->
  <section id="chapters" class="chapters-container">
    <h2>Chapters</h2>
    <div class="chapter-grid" id="chapterGrid">
      <!-- Chapter cards auto-generated via JS -->
    </div>
  </section>

  <!-- Footer -->
  <footer>
    &copy; 2026 PalletHitMe. All rights reserved.
  </footer>

  <!-- JS: Fetch chapters and populate index and navigation -->
  <script>
    // Fetch chapters.json
    fetch('chapters.json')
      .then(res => res.json())
      .then(chapters => {
        // --- Populate navigation ---
        const navigationDiv = document.getElementById('navigation');
        navigationDiv.innerHTML = `
          <div style="margin: 40px 0; text-align: center; font-family: sans-serif;">
            <div style="margin-bottom: 20px;">
              <a href="index.html"
                 style="text-decoration: none; margin: 0 10px; padding: 12px 24px;
                        background-color: #4CAF50; color: white; border-radius: 8px;
                        font-weight: 700; transition: 0.3s; display: inline-block;">
                Back to Main Page
              </a>
              <a href="#" id="lastChapterBtn"
                 style="text-decoration: none; margin: 0 10px; padding: 12px 24px;
                        background-color: #ff6b6b; color: white; border-radius: 8px;
                        font-weight: 700; transition: 0.3s; display: inline-block;">
                ⬅ Last Chapter
              </a>
              <a href="#" id="nextChapterBtn"
                 style="text-decoration: none; margin: 0 10px; padding: 12px 24px;
                        background-color: #ff6b6b; color: white; border-radius: 8px;
                        font-weight: 700; transition: 0.3s; display: inline-block;">
                Next Chapter ➡
              </a>
            </div>
          </div>
        `;

        // --- Populate chapter cards ---
        const chapterGrid = document.getElementById('chapterGrid');
        chapters.forEach((ch, index) => {
          const a = document.createElement('a');
          a.href = ch.file;
          a.className = 'chapter-card';
          a.innerHTML = `
            <span class="chapter-number">Chapter ${index + 1}</span>
            <span class="chapter-title">${ch.title}</span>
          `;
          chapterGrid.appendChild(a);
        });

        // --- Setup last/next buttons ---
        const currentFile = window.location.pathname.split('/').pop();
        const currentIndex = chapters.findIndex(ch => ch.file === currentFile);
        const lastBtn = document.getElementById('lastChapterBtn');
        const nextBtn = document.getElementById('nextChapterBtn');

        if(currentIndex >= 0){
          if(lastBtn) lastBtn.href = currentIndex > 0 ? chapters[currentIndex-1].file : '#';
          if(nextBtn) nextBtn.href = currentIndex < chapters.length-1 ? chapters[currentIndex+1].file : '#';
          if(currentIndex === 0 && lastBtn) lastBtn.style.pointerEvents = 'none';
          if(currentIndex === chapters.length-1 && nextBtn) nextBtn.style.pointerEvents = 'none';
        } else {
          // On index.html, disable both buttons
          if(lastBtn) lastBtn.style.pointerEvents = 'none';
          if(nextBtn) nextBtn.style.pointerEvents = 'none';
        }
      })
      .catch(err => console.error('Failed to load chapters.json', err));
  </script>

</body>
</html>
