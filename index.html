<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I Am This Murim's Crazy Bitch</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Link to external CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Full Cover Hero -->
  <section class="cover-hero">
    <div class="cover-overlay"></div>
    <div class="cover-content">
      <h1>I Am This Murim’s Crazy Bitch</h1>
      <p class="author">By PalletHitMe</p>
      <p class="tagline">Embark on a ruthless martial world where survival is the only law.</p>
      <a href="#chapters" class="read-btn">Start Reading</a>
    </div>
  </section>

  <!-- Chapter List Section -->
  <section id="chapters" class="chapters-container">
    <h2>Chapters</h2>
    <div id="chapterGrid" class="chapter-grid">
      <!-- JS will insert chapter cards here -->
    </div>
  </section>

  <!-- Footer -->
  <footer>
    &copy; 2026 PalletHitMe. All rights reserved.
  </footer>

  <!-- Auto-generate chapter cards via JS -->
  <script>
    // Add your chapter titles here in order
    const chapters = [
      "The First Step into Murim",
      "A Day In The Life Of A Second-Year Martial Artist (1)",
      "A Day In The Life Of A Second-Year Martial Artist (2)",
      "A Day In The Life Of A Second-Year Martial Artist (3)",
      "Friend (1)",
      "Friend (2)"
    ];

    const chapterGrid = document.getElementById('chapterGrid');

    chapters.forEach((title, index) => {
      const chapterNumber = index + 1;

      const card = document.createElement('a');
      card.href = `chapter${chapterNumber}.html`;
      card.className = 'chapter-card';

      card.innerHTML = `
        <span class="chapter-number">Chapter ${chapterNumber}</span><br>
        <span class="chapter-title">${title}</span>
      `;

      chapterGrid.appendChild(card);
    });
  </script>
</body>
</html>
