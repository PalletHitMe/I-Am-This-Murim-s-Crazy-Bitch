<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The First Step into Murim</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Main stylesheet -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navigation -->
<div id="navigation"></div>

<script>
fetch('navigation.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('navigation').innerHTML = data;

    // Auto set Next and Last Chapter buttons
    const currentFile = window.location.pathname.split('/').pop();
    const match = currentFile.match(/chapter(\d+)\.html/);

    if(match){
      const current = parseInt(match[1]);
      const nextBtn = document.getElementById('nextChapterBtn');
      const lastBtn = document.getElementById('lastChapterBtn');

      if(nextBtn) nextBtn.href = `chapter${current + 1}.html`;
      if(lastBtn) lastBtn.href = `chapter${current - 1}.html`;

      if(current === 1 && lastBtn) lastBtn.classList.add('disabled');
      if(current === 6 && nextBtn) nextBtn.classList.add('disabled'); // adjust max chapters
    }
  })
  .catch(err => console.error('Navigation fetch failed:', err));
</script>

<!-- Chapter Content -->
<section class="chapters-container">

  <!-- Chapter Navigation -->
  <div class="chapter-nav">
    <a href="#" id="lastChapterBtn">⬅ Last Chapter</a>
    <a href="#" id="nextChapterBtn">Next Chapter ➡</a>
  </div>

  <div class="chapter-content">
    <h1>༺ The First Step into Murim ༻</h1>

    <p>For factories workers at small and medium companies, playing games was a basic skill.</p>
    <p>Of course, depending on the person, there were some that they didn’t acknowledge what he played as games...</p>

    <!-- Rest of chapter text goes here -->
  </div>
</section>

</body>
</html>
