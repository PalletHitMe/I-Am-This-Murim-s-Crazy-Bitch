<div style="margin: 40px 0; text-align: center; font-family: sans-serif;">
  <!-- Navigation Buttons -->
  <div style="margin-bottom: 20px;">
    <a href="/" 
       style="text-decoration: none; margin: 0 10px; padding: 12px 24px; 
              background-color: #4CAF50; color: white; border-radius: 8px; 
              font-weight: 700; transition: 0.3s; display: inline-block;">
      ⬅ Back to Main Page
    </a>
    <a href="#" id="lastChapterBtn"
       style="text-decoration: none; margin: 0 10px; padding: 12px 24px; 
              background-color: #2196F3; color: white; border-radius: 8px; 
              font-weight: 700; transition: 0.3s; display: inline-block;">
      ⬅ Last Chapter
    </a>
    <a href="#" id="nextChapterBtn"
       style="text-decoration: none; margin: 0 10px; padding: 12px 24px; 
              background-color: #FF9800; color: white; border-radius: 8px; 
              font-weight: 700; transition: 0.3s; display: inline-block;">
      Next Chapter ➡
    </a>
  </div>

  <!-- Chapter Dropdown -->
  <div>
    <label for="chapterSelect" style="font-weight: 700; margin-right: 10px;">Jump to Chapter:</label>
    <select id="chapterSelect"
            onchange="location = this.value;"
            style="padding: 10px 14px; border-radius: 6px; border: 1px solid #ccc; 
                   font-size: 14px; font-weight: 500; background-color: #fff; cursor: pointer;">
      <option value="">Select a chapter</option>
      <option value="/chapter1">Chapter 1: The First Step into Murim</option>
      <option value="/chapter2">Chapter 2: A Day In The Life Of A Second-Year Martial Artist (1)</option>
      <option value="/chapter3">Chapter 3: A Day In The Life Of A Second-Year Martial Artist (2)</option>
      <option value="/chapter4">Chapter 4: A Day In The Life Of A Second-Year Martial Artist (3)</option>
      <option value="/chapter5">Chapter 5: Friend (1)</option>
      <option value="/chapter6">Chapter 6: Friend (2)</option>
      <!-- Add new chapters here -->
    </select>
  </div>

  <style>
    a:hover { opacity: 0.85; }
    select:hover { border-color: #888; }
  </style>

  <script>
    const currentFile = window.location.pathname.split("/").pop(); // e.g., "chapter3"
    const match = currentFile.match(/chapter(\d+)/);

    if(match){
      const current = parseInt(match[1]);
      const lastChapter = document.getElementById("lastChapterBtn");
      const nextChapter = document.getElementById("nextChapterBtn");

      // Last chapter (cannot go below 1)
      lastChapter.href = current > 1 ? `/chapter${current - 1}` : "#";
      if(current === 1){
        lastChapter.style.pointerEvents = 'none';
        lastChapter.style.opacity = 0.5;
      }

      // Next chapter (always adds +1; if you want to limit max, adjust manually)
      nextChapter.href = `/chapter${current + 1}`;
    }
  </script>
</div>
